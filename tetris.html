<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        .game-container {
            display: flex;
            gap: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .game-board {
            position: relative;
        }

        #gameCanvas {
            border: 3px solid #00d9ff;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 150px;
        }

        .panel-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-title {
            font-size: 14px;
            color: #00d9ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
        }

        #nextCanvas {
            border: 2px solid #00d9ff;
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.3);
        }

        .controls {
            font-size: 12px;
            line-height: 1.8;
            color: #aaa;
        }

        .controls span {
            color: #00d9ff;
            font-weight: bold;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
            border: 2px solid #ff4757;
        }

        .game-over h2 {
            color: #ff4757;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .game-over p {
            margin-bottom: 20px;
            font-size: 16px;
        }

        .restart-btn {
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            background: #00b8d4;
            transform: scale(1.05);
        }

        .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #00d9ff;
        }

        .start-screen h1 {
            color: #00d9ff;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .start-btn {
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn:hover {
            background: #00b8d4;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div class="start-screen" id="startScreen">
                <h1>俄罗斯方块</h1>
                <button class="start-btn" onclick="startGame()">开始游戏</button>
            </div>
            <div class="game-over" id="gameOver">
                <h2>游戏结束</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <button class="restart-btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>
        <div class="side-panel">
            <div class="panel-section">
                <div class="panel-title">得分</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="panel-section">
                <div class="panel-title">等级</div>
                <div class="score-value" id="level">1</div>
            </div>
            <div class="panel-section">
                <div class="panel-title">下一个</div>
                <canvas id="nextCanvas" width="120" height="120"></canvas>
            </div>
            <div class="panel-section">
                <div class="panel-title">操作说明</div>
                <div class="controls">
                    <span>←</span> 左移<br>
                    <span>→</span> 右移<br>
                    <span>↓</span> 加速下落<br>
                    <span>↑</span> 旋转<br>
                    <span>空格</span> 直接落下<br>
                    <span>P</span> 暂停
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        const NEXT_BLOCK_SIZE = 25;

        // 方块颜色
        const COLORS = [
            null,
            '#00d9ff', // I - 青色
            '#ffd700', // O - 黄色
            '#9b59b6', // T - 紫色
            '#2ecc71', // S - 绿色
            '#e74c3c', // Z - 红色
            '#3498db', // J - 蓝色
            '#e67e22'  // L - 橙色
        ];

        // 方块形状
        const SHAPES = [
            null,
            [[1, 1, 1, 1]],                          // I
            [[2, 2], [2, 2]],                        // O
            [[0, 3, 0], [3, 3, 3]],                  // T
            [[0, 4, 4], [4, 4, 0]],                  // S
            [[5, 5, 0], [0, 5, 5]],                  // Z
            [[6, 0, 0], [6, 6, 6]],                  // J
            [[0, 0, 7], [7, 7, 7]]                   // L
        ];

        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let gameLoop = null;
        let isGameOver = false;
        let isPaused = false;
        let dropInterval = 1000;

        // 初始化游戏板
        function initBoard() {
            board = [];
            for (let row = 0; row < ROWS; row++) {
                board[row] = [];
                for (let col = 0; col < COLS; col++) {
                    board[row][col] = 0;
                }
            }
        }

        // 创建新方块
        function createPiece(type) {
            const shape = SHAPES[type].map(row => [...row]);
            return {
                shape: shape,
                type: type,
                x: Math.floor(COLS / 2) - Math.floor(shape[0].length / 2),
                y: 0
            };
        }

        // 随机生成方块
        function randomPiece() {
            const type = Math.floor(Math.random() * 7) + 1;
            return createPiece(type);
        }

        // 绘制单个方块
        function drawBlock(ctx, x, y, color, size) {
            ctx.fillStyle = color;
            ctx.fillRect(x * size, y * size, size - 1, size - 1);
            
            // 添加高光效果
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(x * size, y * size, size - 1, 3);
            ctx.fillRect(x * size, y * size, 3, size - 1);
            
            // 添加阴影效果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(x * size + size - 4, y * size, 3, size - 1);
            ctx.fillRect(x * size, y * size + size - 4, size - 1, 3);
        }

        // 绘制游戏板
        function drawBoard() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col]) {
                        drawBlock(ctx, col, row, COLORS[board[row][col]], BLOCK_SIZE);
                    }
                }
            }
        }

        // 绘制当前方块
        function drawPiece() {
            if (!currentPiece) return;
            
            currentPiece.shape.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        drawBlock(
                            ctx,
                            currentPiece.x + x,
                            currentPiece.y + y,
                            COLORS[value],
                            BLOCK_SIZE
                        );
                    }
                });
            });
        }

        // 绘制下一个方块
        function drawNextPiece() {
            nextCtx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            if (!nextPiece) return;

            const offsetX = (nextCanvas.width / NEXT_BLOCK_SIZE - nextPiece.shape[0].length) / 2;
            const offsetY = (nextCanvas.height / NEXT_BLOCK_SIZE - nextPiece.shape.length) / 2;

            nextPiece.shape.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        drawBlock(
                            nextCtx,
                            offsetX + x,
                            offsetY + y,
                            COLORS[value],
                            NEXT_BLOCK_SIZE
                        );
                    }
                });
            });
        }

        // 碰撞检测
        function collision(piece, offsetX = 0, offsetY = 0) {
            return piece.shape.some((row, y) => {
                return row.some((value, x) => {
                    if (!value) return false;
                    const newX = piece.x + x + offsetX;
                    const newY = piece.y + y + offsetY;
                    return (
                        newX < 0 ||
                        newX >= COLS ||
                        newY >= ROWS ||
                        (newY >= 0 && board[newY][newX])
                    );
                });
            });
        }

        // 合并方块到游戏板
        function mergePiece() {
            currentPiece.shape.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        const boardY = currentPiece.y + y;
                        const boardX = currentPiece.x + x;
                        if (boardY >= 0) {
                            board[boardY][boardX] = value;
                        }
                    }
                });
            });
        }

        // 清除完整行
        function clearLines() {
            let linesCleared = 0;

            for (let row = ROWS - 1; row >= 0; row--) {
                if (board[row].every(cell => cell !== 0)) {
                    board.splice(row, 1);
                    board.unshift(new Array(COLS).fill(0));
                    linesCleared++;
                    row++;
                }
            }

            if (linesCleared > 0) {
                const points = [0, 100, 300, 500, 800];
                score += points[linesCleared] * level;
                document.getElementById('score').textContent = score;

                // 升级
                const newLevel = Math.floor(score / 1000) + 1;
                if (newLevel > level) {
                    level = newLevel;
                    document.getElementById('level').textContent = level;
                    dropInterval = Math.max(100, 1000 - (level - 1) * 100);
                }
            }
        }

        // 旋转方块
        function rotate(piece) {
            const newShape = piece.shape[0].map((_, i) =>
                piece.shape.map(row => row[i]).reverse()
            );
            const rotated = { ...piece, shape: newShape };
            
            if (!collision(rotated)) {
                piece.shape = newShape;
            } else if (!collision(rotated, -1, 0)) {
                piece.x -= 1;
                piece.shape = newShape;
            } else if (!collision(rotated, 1, 0)) {
                piece.x += 1;
                piece.shape = newShape;
            }
        }

        // 移动方块
        function movePiece(dir) {
            if (!collision(currentPiece, dir, 0)) {
                currentPiece.x += dir;
            }
        }

        // 下落方块
        function dropPiece() {
            if (!collision(currentPiece, 0, 1)) {
                currentPiece.y++;
            } else {
                mergePiece();
                clearLines();
                currentPiece = nextPiece;
                nextPiece = randomPiece();
                drawNextPiece();

                if (collision(currentPiece)) {
                    gameOver();
                }
            }
        }

        // 直接落下
        function hardDrop() {
            while (!collision(currentPiece, 0, 1)) {
                currentPiece.y++;
                score += 2;
            }
            document.getElementById('score').textContent = score;
            dropPiece();
        }

        // 游戏结束
        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        // 游戏主循环
        let lastTime = 0;
        function update(time = 0) {
            if (isGameOver || isPaused) return;

            const deltaTime = time - lastTime;
            if (deltaTime > dropInterval) {
                dropPiece();
                lastTime = time;
            }

            drawBoard();
            drawPiece();
            gameLoop = requestAnimationFrame(update);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (isGameOver) return;

            switch (e.keyCode) {
                case 37: // 左
                    movePiece(-1);
                    break;
                case 39: // 右
                    movePiece(1);
                    break;
                case 40: // 下
                    dropPiece();
                    break;
                case 38: // 上 - 旋转
                    rotate(currentPiece);
                    break;
                case 32: // 空格 - 直接落下
                    hardDrop();
                    break;
                case 80: // P - 暂停
                    togglePause();
                    break;
            }
        });

        // 暂停/继续
        function togglePause() {
            isPaused = !isPaused;
            if (!isPaused) {
                lastTime = performance.now();
                update();
            }
        }

        // 开始游戏
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            initBoard();
            score = 0;
            level = 1;
            dropInterval = 1000;
            isGameOver = false;
            isPaused = false;
            document.getElementById('score').textContent = '0';
            document.getElementById('level').textContent = '1';
            
            currentPiece = randomPiece();
            nextPiece = randomPiece();
            drawNextPiece();
            lastTime = performance.now();
            update();
        }

        // 重新开始
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }

        // 初始绘制
        drawBoard();
        drawNextPiece();
    </script>
</body>
</html>
